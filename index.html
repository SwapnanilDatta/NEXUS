<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Game Login</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body id ="background">
    <div class="login-container">
        <div class="login-header">
            <img src="football-logo.png" alt="Football Logo" class="logo">
            <h1>Football Game Login</h1>
        </div>
        <form class="login-form">
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">Login</button>
            <div class="form-links">
                <a href="#">Forgot Password?</a>
                <a href="#">Sign Up</a>
            </div>
        </form>
        <div class="social-login">
            <p>Or login with:</p>
            <button class="social-button google">Google</button>
            <button class="social-button facebook">Facebook</button>
        </div>
    </div>
</body>
</html>
