<!DOCTYPE html>
<html lang="en">
<head>
    <script src="script.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Schedule</title>
    <style>
    body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 0;
  background-color: #f0f8ff; /* Light blue background for a fresh look */
}

.schedule-container {
  max-width: 1200px;
  margin: 20px auto;
  padding: 20px;
  background-color: #ffffff;
  border-radius: 15px;
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15); /* Deeper shadow for a pop effect */
  display: block;
  grid-template-columns: repeat(2, 1fr);
  grid-gap: 20px;
}

h2 {
  text-align: center;
  color: #4A90E2; /* A stronger blue color for headings */
  font-size: 32px;
  margin-bottom: 20px;
}

.match-card {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); /* Subtle gradient background */
  margin-bottom: 15px;
  padding: 20px;
  border-radius: 10px;
  transition: transform 0.3s ease, background-color 0.3s ease; /* Adding a slight transform effect */
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  border: 1px solid #FFC107;
  box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); /* Adding subtle shadow for depth */
}

.match-card:hover {
  background-color: #eceff1; /* Lighter color on hover */
  transform: scale(1.05); /* Slight zoom effect on hover */
  box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15); /* Enhanced shadow effect */
}

.match-info {
  display: flex;
  align-items: center;
}

.team-logo {
  width: 60px;
  height: 60px;
  margin-right: 15px;
  border-radius: 50%;
  border: 2px solid #FFC107; /* A stronger border for the team logo */
}

.team {
  margin: 0 25px;
  font-size: 24px;
  font-weight: bold;
  color: #333; /* Darker color for the team names */
}

.vs {
  font-size: 20px;
  color: #888;
  margin: 0 25px;
}

.match-time {
  font-size: 20px;
  color: #555;
  font-style: italic;
}

/* Media Queries to Make the Site Responsive */
@media (max-width: 768px) {
  .schedule-container {
    grid-template-columns: 1fr; /* Single column layout on smaller screens */
  }

  .team {
    margin: 0 15px;
  }

  .match-time {
    font-size: 18px;
  }
}

    </style>
</head>
