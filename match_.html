<!DOCTYPE html>
<html lang="en">
<head>
    <script src="script.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Schedule</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        .schedule-container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            color: #333;
        }

        .match-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #e3e3e3;
            margin-bottom: 15px;
            padding: 20px;
            border-radius: 10px;
            transition: background-color 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        .match-card:hover {
            background-color: #d1d1d1;
        }

        .match-info {
            display: flex;
            align-items: center;
        }

        .team-logo {
            width: 50px;
            height: 50px;
            margin-right: 10px;
            border-radius: 50%;
        }

        .team {
            margin: 0 20px;
            font-size: 22px;
            font-weight: bold;
        }

        .vs {
            font-size: 18px;
            color: #555;
            margin: 0 20px;
        }

        .match-time {
            font-size: 18px;
            color: #555;
        }
    </style>
</head>
<body>

                <img src="teamB_logo.png" alt="Team B Logo" class="team-logo">
            </div>

        </a>

            </div>
